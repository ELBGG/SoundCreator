name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Read current version
        id: version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          MAJOR=$(echo "$VERSION" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION" | cut -d'.' -f2)
          NEW_VERSION="${MAJOR}.$((MINOR + 1))"
          echo "current=$VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Bump version in gradle.properties
        run: sed -i "s/^version=.*/version=${{ steps.version.outputs.next }}/" gradle.properties

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.next }}"
          git push origin main

      - name: Build all platforms
        run: |
          ./gradlew \
            :core:build \
            :paper:shadowJar \
            :forge-1.20.1:build \
            :forge-1.21.1:build \
            :fabric-1.20.1:build \
            :fabric-1.21.1:build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.next }}"
          name: "v${{ steps.version.outputs.next }}"
          draft: false
          prerelease: false
          files: |
            paper/build/libs/SoundCreator-paper-*.jar
            forge-1.20.1/build/libs/SoundCreator-forge-1.20.1-*.jar
            forge-1.21.1/build/libs/SoundCreator-forge-1.21.1-*.jar
            fabric-1.20.1/build/libs/SoundCreator-fabric-1.20.1-*.jar
            fabric-1.21.1/build/libs/SoundCreator-fabric-1.21.1-*.jar
          body: |
            ## SoundCreator v${{ steps.version.outputs.next }}

            | Plataforma | Versión MC |
            |------------|-----------|
            | Paper/Spigot | 1.20.1 – 1.21.1 |
            | Forge | 1.20.1 |
            | Forge | 1.21.1 |
            | Fabric | 1.20.1 |
            | Fabric | 1.21.1 |

            Requiere [PlasmoVoice](https://modrinth.com/plugin/plasmo-voice) 2.1.8+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
