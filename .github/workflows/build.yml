name: Build

on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build all platforms
        run: |
          ./gradlew \
            :core:build \
            :paper:shadowJar \
            :forge-1.20.1:build \
            :forge-1.21.1:build \
            :fabric-1.20.1:build \
            :fabric-1.21.1:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SoundCreator-all
          path: |
            paper/build/libs/SoundCreator-paper-*.jar
            forge-1.20.1/build/libs/SoundCreator-forge-1.20.1-*.jar
            forge-1.21.1/build/libs/SoundCreator-forge-1.21.1-*.jar
            fabric-1.20.1/build/libs/SoundCreator-fabric-1.20.1-*.jar
            fabric-1.21.1/build/libs/SoundCreator-fabric-1.21.1-*.jar
